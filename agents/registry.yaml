version: 1

description: >
  Local registry for model adapters and agency-style skills. Skill IDs are
  stable local identifiers. Each skill has one explicit source: local or
  agency_agents.

agency_agents:
  repository: "https://github.com/msitarzewski/agency-agents"
  pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
  license: "MIT"
  license_file: "agents/skills/AGENCY-AGENTS-LICENSE.md"
  notes:
    - "Vendored files are adapted under agents/skills/ with project overrides."
    - "Upstream Identity & Memory sections were removed."

controllers:
  default:
    id: glm52_controller
    adapter: claude_glm
    model: "glm-5.2[1m]"
    role: orchestrator
    can_accept_final: false
    notes:
      - "Use local claude-glm adapter without recording expanded environment."
      - "Controller passes raw artifact paths to reviewers."

adapters:
  claude_glm:
    kind: claude_code_alias
    provider_identity: zhipu_glm
    invocation_owner: runner
    prompt_mode: claude_print
    binary: claude-glm
    availability_check_command: "type claude-glm"
    noninteractive_command: "claude-glm -p \"$(cat <prompt-file>)\""
    supports_write: true
    supports_read_only: true
    timeout_seconds: 3000
    secret_handling: "never_log_expanded_environment"
    notes:
      - "This may be a shell alias/function. Runner scripts must load the shell profile or use an absolute wrapper path."
      - "If the alias is missing, do not substitute Anthropic Claude while claiming GLM provider identity."

  claude:
    kind: claude_code
    provider_identity: anthropic
    invocation_owner: runner
    prompt_mode: claude_print
    binary: claude
    default_review_model: "claude-fable-5"
    availability_check_command: "command -v claude"
    read_only_review_command: "claude --model claude-fable-5 --permission-mode plan --json-schema \"$(cat schemas/review-verdict.schema.json)\" -p \"$(cat <prompt-file>)\""
    development_command: "claude --model claude-fable-5 --permission-mode acceptEdits -p \"$(cat <prompt-file>)\""
    yolo_command: "claude --model claude-fable-5 --permission-mode bypassPermissions -p \"$(cat <prompt-file>)\""
    supports_write: true
    supports_read_only: true
    timeout_seconds: 1800
    notes:
      - "Use fable5 for Claude review unless user or registry explicitly changes it."
      - "If --json-schema is unavailable locally, validate the captured final JSON verdict with the runner."

  codex:
    kind: codex_cli
    provider_identity: openai
    invocation_owner: runner
    binary: codex
    default_model: "gpt5.5"
    default_reasoning_effort: xhigh
    availability_check_command: "command -v codex"
    development_command: "codex -C <repo> -m gpt5.5 -s workspace-write -a never exec - < <prompt-file>"
    yolo_command: "codex -C <repo> -m gpt5.5 -s danger-full-access -a never exec - < <prompt-file>"
    schema_review_command: "codex -C <repo> -m gpt5.5 -s read-only -a never exec --output-schema schemas/review-verdict.schema.json - < <prompt-file>"
    freeform_review_command: "codex -C <repo> review --base <base> <prompt>"
    warning: "codex -p is --profile, not prompt"
    supports_write: true
    supports_read_only: true
    timeout_seconds: 1800
    notes:
      - "If xhigh effort is implemented through a local profile/config, the runner must apply that profile/config."
      - "Do not silently downgrade model or reasoning effort; route through fallback rules."

  kimi:
    kind: kimi_code
    provider_identity: moonshot_kimi
    invocation_owner: controller
    binary_candidates: [kimi-for-coding, kimi]
    availability_check_command: "command -v kimi || command -v kimi-for-coding"
    default_model_policy: "use local Kimi Code configured default/latest model; omit -m unless stage pins a model"
    design_model: "kimi-2.7"
    noninteractive_command: "kimi -p \"$(cat <prompt-file>)\""
    plan_command: "kimi --plan -p \"$(cat <prompt-file>)\""
    yolo_command: "kimi -y -p \"$(cat <prompt-file>)\""
    supports_write: true
    supports_read_only: false
    notes:
      - "Use as implementation subagent only when workflow explicitly allows it."
      - "If the local wrapper is named kimi-for-coding, substitute that binary for kimi."

  grok:
    kind: grok_cli
    provider_identity: xai_grok
    invocation_owner: runner
    binary: grok
    development_model: "grok-composer-2.5-fast"
    review_1_model: "grok-build"
    direction_model: "grok-build"
    observed_available_models:
      - "grok-build"
      - "grok-composer-2.5-fast"
    availability_check_command: "grok models"
    if_review_1_model_unavailable: human_escalation_required
    interactive_command: "grok --cwd <repo> --model grok-build"
    development_command: "grok --cwd <repo> --model grok-composer-2.5-fast --permission-mode acceptEdits --check --effort high --prompt-file <prompt-file>"
    yolo_command: "grok --cwd <repo> --model grok-composer-2.5-fast --permission-mode bypassPermissions --always-approve --prompt-file <prompt-file>"
    review_1_command: "grok --cwd <repo> --model grok-build --permission-mode plan --effort high --prompt-file <prompt-file>"
    review_1_timeout_seconds: 900
    supports_write: true
    supports_read_only: true
    timeout_seconds: 1800
    notes:
      - "A controller session lacking Grok tools is not enough to mark Grok unavailable; the runner must try the CLI adapter."
      - "If review-1 produces no schema-valid verdict within 900 seconds, route model_unavailable -> human_escalation_required."

direction_panels:
  key_mapping:
    stage_id_to_panel_key: "replace '-' with '_'"
    example: "2026-07-initial-direction -> 2026_07_initial_direction"
    stage_record_required: "00-intake.md or status.json must record the active direction panel key before synthesis."

  default:
    description: "Default milestone direction panel. Individual stages may override or extend this before drafting starts."
    output_dir: "reports/agent-runs/{{stage_id}}/direction-drafts"
    member_output_template: "{{model_id}}.md"
    unavailable_output_template: "{{model_id}}.unavailable.md"
    synthesizer:
      id: codex
      provider: codex
      model: gpt
      skill: product_strategist
      output: "06-direction-synthesis.md"
    members:
      - id: codex
        provider: codex
        model: gpt
        skill: product_strategist
      - id: claude
        provider: claude
        model: claude
        skill: product_strategist
      - id: glm52
        provider: claude_glm
        model: "glm-5.2[1m]"
        skill: product_strategist
      - id: kimi27
        provider: kimi
        model: "kimi-2.7"
        skill: product_strategist
      - id: grok-build
        provider: grok
        model: "grok-build"
        skill: product_strategist

  2026_07_initial_direction:
    description: "Actual panel used for the initial Binance funding hedging direction round."
    output_dir: "reports/agent-runs/2026-07-initial-direction/direction-drafts"
    collection_mode: mixed_runner_and_user_supplied
    synthesizer:
      id: codex
      provider: codex
      model: gpt
      skill: product_strategist
      output: "06-direction-synthesis.md"
    members:
      - id: deepseek
        source: user_supplied_external
        provider: deepseek
        model: "DeepSeek V4"
        output: "deepseek.md"
      - id: fable5
        source: user_supplied_external
        provider: anthropic
        model: "Claude Fable 5"
        output: "fable5.md"
      - id: gemini3.1pro
        source: user_supplied_external
        provider: google
        model: "Gemini 3.1 Pro"
        output: "gemini3.1pro.md"
      - id: glm52
        provider: claude_glm
        model: "glm-5.2[1m]"
        skill: product_strategist
        output: "glm52.md"
      - id: kimi27
        provider: kimi
        model: "kimi-2.7"
        skill: product_strategist
        output: "kimi27.md"
      - id: grok-build
        provider: grok
        model: "grok-build"
        skill: product_strategist
        output: "grok-build.md"

skills:
  product_strategist:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/product-strategist.md"
    purpose: "Turn product intent into bounded requirements, non-goals, and acceptance criteria."
    allowed_modes: [read_write_docs]

  complexity_evaluator:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/complexity-evaluator.md"
    purpose: "Classify work as LOW, MEDIUM, HIGH, or MILESTONE and route workflow overhead accordingly."
    allowed_modes: [read_write_docs]

  software_architect:
    source: agency_agents
    agency_ref: "engineering/engineering-software-architect.md"
    vendored_at: "agents/skills/software-architect.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Design module boundaries, data flow, technical risks, and test strategy."
    allowed_modes: [read_write_docs, read_only]

  task_planner:
    source: agency_agents
    agency_ref: "project-management/project-manager-senior.md"
    vendored_at: "agents/skills/task-planner.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Split a stage into small implementation tasks with file boundaries and dependencies."
    allowed_modes: [read_write_docs]

  senior_developer:
    source: agency_agents
    agency_ref: "engineering/engineering-backend-architect.md"
    vendored_at: "agents/skills/senior-developer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Implement bounded code changes with tests."
    allowed_modes: [write_code]
    rationale:
      - "Use backend architect instead of engineering-senior-developer because the latter is Laravel/Livewire-oriented."

  minimal_change_engineer:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/minimal-change-engineer.md"
    purpose: "Fix review findings with the smallest traceable patch."
    allowed_modes: [write_code]

  code_reviewer:
    source: agency_agents
    agency_ref: "engineering/engineering-code-reviewer.md"
    vendored_at: "agents/skills/code-reviewer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Review raw artifacts for correctness, regressions, missing tests, and contract drift."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Response must end with schema-valid JSON verdict."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

  reality_checker:
    source: agency_agents
    agency_ref: "testing/testing-reality-checker.md"
    vendored_at: "agents/skills/reality-checker.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Final verification that evidence matches claims and verdict JSON is schema-valid."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Default to BLOCKED unless raw evidence is sufficient."
      - "Response must end with schema-valid JSON verdict."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

  test_strategist:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/test-strategist.md"
    reference_only: "testing/testing-evidence-collector.md"
    purpose: "Design deterministic tests, replay fixtures, and acceptance checks."
    allowed_modes: [read_write_docs, read_only]

  security_reviewer:
    source: agency_agents
    agency_ref: "security/security-appsec-engineer.md"
    vendored_at: "agents/skills/security-reviewer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Check credential handling, unsafe commands, and sensitive output leakage."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Response must end with schema-valid JSON verdict when used as a gate."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

model_policies:
  no_self_review: true
  reviewer_requires_raw_artifacts: true
  rework_verdict_requires_fix_start_prompt: true
  invalid_json_verdict: retry_once_then_fallback_or_human_escalation
  default_max_rework: 3
  diff_fingerprint: "head_sha + ':' + sha256(git diff --binary <base_sha>..HEAD)"
  final_reviewer_must_differ_from_designer: true
  review_1_identity_granularity: model
  review_2_identity_granularity: provider
  review_1_model_required: "grok-build"
  grok_development_model: "grok-composer-2.5-fast"
  review_2_fallback_allowed_on:
    - quota_exhausted
    - auth_failure
    - service_unavailable
    - anti_self_review_ineligible
    - invalid_verdict_json
  terminal_stop_reasons:
    - decision_models_exhausted
    - development_models_exhausted
    - stage_accepted_waiting_user
    - human_escalation_required

rotation_defaults:
  designers: [codex, claude]
  direction_panel_scope: milestone_or_user_requested
  direction_panel_skip_allowed_when:
    - user_approved_lightweight_route
    - existing_synthesis_covers_task
  direction_panel:
    registry_ref: direction_panels.default
    output_dir: "reports/agent-runs/{{stage_id}}/direction-drafts"
    member_output_template: "{{model_id}}.md"
    unavailable_output_template: "{{model_id}}.unavailable.md"
  complexity_levels:
    LOW:
      direction_panel_required: false
      route: stage-design
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    MEDIUM:
      direction_panel_required: false
      route: stage-design
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    HIGH:
      direction_panel_required: true
      route: direction-drafts
      user_override_allowed: true
    MILESTONE:
      direction_panel_required: true
      route: direction-drafts
      user_override_allowed: false
  direction_synthesizer:
    provider: codex
    output: "06-direction-synthesis.md"
  review_1:
    provider: grok
    model: "grok-build"
  review_2:
    primary: codex
    fallback: claude
  review_policy:
    review_1_may_equal_designer: true
    final_review_2_must_differ_from_designer: true
    review_1_model_must_differ_from_implementer_model: true
    review_2_provider_must_differ_from_implementer_provider: true
    review_2_fallback_allowed_only_on_listed_reasons: true
