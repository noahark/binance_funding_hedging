version: 1

description: >
  Local registry for model adapters and agency-style skills. Skill IDs are
  stable local identifiers. Each skill has one explicit source: local or
  agency_agents.

agency_agents:
  repository: "https://github.com/msitarzewski/agency-agents"
  pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
  license: "MIT"
  license_file: "agents/skills/AGENCY-AGENTS-LICENSE.md"
  notes:
    - "Vendored files are adapted under agents/skills/ with project overrides."
    - "Upstream Identity & Memory sections were removed."

bookkeepers:
  default:
    id: independent_stage_bookkeeper
    role: bookkeeper
    assignment_policy: "stage intake or user selects an independent local execution session"
    can_accept_final: false
    default_must_be_independent_from_implementers: true
    notes:
      - "Bookkeeper is the single writer for status.json, handoff files, validation logs, and evidence commits."
      - "Bookkeeper passes raw artifact paths to reviewers."
      - "GLM5.2 through claude-glm can be assigned as bookkeeper only when the stage records that assignment."
      - "If bookkeeper also implements, disclose the dual-hat role in status.json and 70-handoff.md."
  glm52_candidate:
    id: glm52_bookkeeper_candidate
    adapter: claude_glm
    model: "glm-5.2[1m]"
    role: bookkeeper
    can_accept_final: false
    notes:
      - "Use only when explicitly assigned by stage intake or user."
      - "Do not assume GLM is bookkeeper just because it is backend implementer."

controllers:
  default:
    alias_for: bookkeepers.default
    deprecated: true
    notes:
      - "Legacy name kept only for old stage artifacts. New stages should use bookkeepers.default."

adapters:
  claude_glm:
    kind: claude_code_alias
    provider_identity: zhipu_glm
    invocation_owner: runner
    prompt_mode: claude_print
    binary: claude-glm
    availability_check_command: "zsh -lic 'type claude-glm'"
    noninteractive_command: "claude-glm --model glm-5.2 -p \"$(cat <prompt-file>)\""
    read_only_review_command: "claude-glm --model glm-5.2 --permission-mode plan -p \"$(cat <prompt-file>)\""
    embedded_read_only_review_command: "claude-glm --model glm-5.2 --permission-mode plan -p \"$(cat <prompt-file>)\""
    embedded_read_only_review_enforcement: adapter_plan_mode
    yolo_command: "claude-glm --model glm-5.2 --dangerously-skip-permissions -p \"$(cat <prompt-file>)\""
    supports_write: true
    supports_read_only: true
    timeout_seconds: 3000
    secret_handling: "never_log_expanded_environment"
    notes:
      - "This may be a shell alias/function. Runner scripts must load the shell profile, use zsh -lic, or use an absolute wrapper path."
      - "If the alias is missing, do not substitute Anthropic Claude while claiming GLM provider identity."
      - "Never log the expanded alias environment; it contains credentials."

  claude:
    kind: claude_code
    provider_identity: anthropic
    invocation_owner: runner
    prompt_mode: claude_print
    binary: claude
    default_review_model: "claude-fable-5"
    fallback_review_model_on_quota: "opus4.8"
    availability_check_command: "command -v claude"
    read_only_review_command: "claude --model claude-fable-5 --permission-mode plan --json-schema \"$(cat schemas/review-verdict.schema.json)\" -p \"$(cat <prompt-file>)\""
    fallback_read_only_review_command: "claude --model opus4.8 --permission-mode plan --json-schema \"$(cat schemas/review-verdict.schema.json)\" -p \"$(cat <prompt-file>)\""
    development_command: "claude --model claude-fable-5 --permission-mode acceptEdits -p \"$(cat <prompt-file>)\""
    fallback_development_command_on_quota: "claude --model opus4.8 --permission-mode acceptEdits -p \"$(cat <prompt-file>)\""
    yolo_command: "claude --model claude-fable-5 --permission-mode bypassPermissions -p \"$(cat <prompt-file>)\""
    supports_write: true
    supports_read_only: true
    timeout_seconds: 1800
    notes:
      - "Use fable5 first for Claude review; if fable5 quota is exhausted, use opus4.8 as the Anthropic fallback model."
      - "If --json-schema is unavailable locally, validate the captured final JSON verdict with the runner."

  codex:
    kind: codex_cli
    provider_identity: openai
    invocation_owner: runner
    binary: codex
    default_model: "gpt-5.5"
    default_reasoning_effort: xhigh
    availability_check_command: "command -v codex"
    schema_review_command: "codex exec -C <repo> -m gpt-5.5 -s read-only --output-schema schemas/review-verdict.schema.json - < <prompt-file>"
    freeform_review_command: "codex exec review --base <base> - < <prompt-file>"
    warning: "codex -p is --profile, not prompt"
    supports_write: false
    supports_read_only: true
    supports_delivery_code_write: false
    timeout_seconds: 1800
    notes:
      - "Codex is not an implementation or fix author in this Harness. Do not dispatch delivery code or fix tasks to Codex."
      - "If xhigh effort is implemented through a local profile/config, the runner must apply that profile/config."
      - "Do not silently downgrade model or reasoning effort; route through fallback rules."

  kimi:
    kind: kimi_code
    provider_identity: moonshot_kimi
    invocation_owner: runner
    binary_candidates: [kimi-for-coding, kimi]
    availability_check_command: "command -v kimi || command -v kimi-for-coding"
    default_model_policy: "use explicit latest Kimi coding alias: --model kimi-code/kimi-for-coding"
    design_model: "kimi-code/kimi-for-coding"
    noninteractive_command: "kimi --model kimi-code/kimi-for-coding -p \"$(cat <prompt-file>)\""
    embedded_read_only_review_command: "kimi --model kimi-code/kimi-for-coding -p \"$(cat <prompt-file>)\""
    embedded_read_only_review_enforcement: prompt_and_wrapper
    plan_command: "kimi --model kimi-code/kimi-for-coding --plan"
    yolo_command: "kimi --model kimi-code/kimi-for-coding -y"
    supports_write: true
    supports_read_only: true
    notes:
      - "Use as implementation subagent only when workflow explicitly allows it."
      - "If the local wrapper is named kimi-for-coding, substitute that binary for kimi."
      - "Current CLI rejects combining --plan or -y with -p/--prompt; one-shot review prompts must use noninteractive_command with read-only instructions."

  grok:
    kind: grok_cli
    provider_identity: xai_grok
    invocation_owner: runner
    binary: grok
    development_model: "grok-composer-2.5-fast"
    optional_review_model: "grok-build"
    direction_model: "grok-build"
    observed_available_models:
      - "grok-build"
      - "grok-composer-2.5-fast"
    availability_check_command: "grok models"
    interactive_command: "grok --cwd <repo> --model grok-build"
    development_command: "grok --cwd <repo> --model grok-composer-2.5-fast --permission-mode acceptEdits --check --effort high --prompt-file <prompt-file>"
    yolo_command: "grok --cwd <repo> --model grok-composer-2.5-fast --permission-mode bypassPermissions --always-approve --prompt-file <prompt-file>"
    optional_review_command: "grok --cwd <repo> --model grok-build --permission-mode plan --effort high --prompt-file <prompt-file>"
    optional_review_timeout_seconds: 900
    supports_write: true
    supports_read_only: true
    timeout_seconds: 1800
    notes:
      - "Grok is not a default Harness review gate. Use only for direction drafts, experiments, or explicit user-enabled tasks."
      - "Do not silently substitute Grok Build for cross-review review-1."

direction_panels:
  key_mapping:
    stage_id_to_panel_key: "replace '-' with '_'"
    example: "2026-07-initial-direction -> 2026_07_initial_direction"
    stage_record_required: "00-intake.md or status.json must record the active direction panel key before synthesis."

  default:
    description: "Default milestone direction panel. Individual stages may override or extend this before drafting starts."
    output_dir: "reports/agent-runs/{{stage_id}}/direction-drafts"
    member_output_template: "{{model_id}}.md"
    unavailable_output_template: "{{model_id}}.unavailable.md"
    synthesizer:
      id: codex
      provider: codex
      model: gpt
      skill: product_strategist
      output: "06-direction-synthesis.md"
    members:
      - id: codex
        provider: codex
        model: gpt
        skill: product_strategist
      - id: claude
        provider: claude
        model: claude
        skill: product_strategist
      - id: glm52
        provider: claude_glm
        model: "glm-5.2[1m]"
        skill: product_strategist
      - id: kimi27
        provider: kimi
        model: "kimi-2.7"
        skill: product_strategist
      - id: grok-build
        provider: grok
        model: "grok-build"
        skill: product_strategist

  2026_07_initial_direction:
    description: "Actual panel used for the initial Binance funding hedging direction round."
    output_dir: "reports/agent-runs/2026-07-initial-direction/direction-drafts"
    collection_mode: mixed_runner_and_user_supplied
    synthesizer:
      id: codex
      provider: codex
      model: gpt
      skill: product_strategist
      output: "06-direction-synthesis.md"
    members:
      - id: deepseek
        source: user_supplied_external
        provider: deepseek
        model: "DeepSeek V4"
        output: "deepseek.md"
      - id: fable5
        source: user_supplied_external
        provider: anthropic
        model: "Claude Fable 5"
        output: "fable5.md"
      - id: gemini3.1pro
        source: user_supplied_external
        provider: google
        model: "Gemini 3.1 Pro"
        output: "gemini3.1pro.md"
      - id: glm52
        provider: claude_glm
        model: "glm-5.2[1m]"
        skill: product_strategist
        output: "glm52.md"
      - id: kimi27
        provider: kimi
        model: "kimi-2.7"
        skill: product_strategist
        output: "kimi27.md"
      - id: grok-build
        provider: grok
        model: "grok-build"
        skill: product_strategist
        output: "grok-build.md"

skills:
  product_strategist:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/product-strategist.md"
    purpose: "Turn product intent into bounded requirements, non-goals, and acceptance criteria."
    allowed_modes: [read_write_docs]

  complexity_evaluator:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/complexity-evaluator.md"
    purpose: "Classify work as LOW, MEDIUM, HIGH, or MILESTONE and route workflow overhead accordingly."
    allowed_modes: [read_write_docs]

  software_architect:
    source: agency_agents
    agency_ref: "engineering/engineering-software-architect.md"
    vendored_at: "agents/skills/software-architect.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Design module boundaries, data flow, technical risks, and test strategy."
    allowed_modes: [read_write_docs, read_only]

  task_planner:
    source: agency_agents
    agency_ref: "project-management/project-manager-senior.md"
    vendored_at: "agents/skills/task-planner.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Split a stage into small implementation tasks with file boundaries and dependencies."
    allowed_modes: [read_write_docs]

  senior_developer:
    source: agency_agents
    agency_ref: "engineering/engineering-backend-architect.md"
    vendored_at: "agents/skills/senior-developer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Implement bounded code changes with tests."
    allowed_modes: [write_code]
    rationale:
      - "Use backend architect instead of engineering-senior-developer because the latter is Laravel/Livewire-oriented."

  minimal_change_engineer:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/minimal-change-engineer.md"
    purpose: "Fix review findings with the smallest traceable patch."
    allowed_modes: [write_code]

  code_reviewer:
    source: agency_agents
    agency_ref: "engineering/engineering-code-reviewer.md"
    vendored_at: "agents/skills/code-reviewer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Review raw artifacts for correctness, regressions, missing tests, and contract drift."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Response must end with schema-valid JSON verdict."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

  reality_checker:
    source: agency_agents
    agency_ref: "testing/testing-reality-checker.md"
    vendored_at: "agents/skills/reality-checker.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Final verification that evidence matches claims and verdict JSON is schema-valid."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Default to BLOCKED unless raw evidence is sufficient."
      - "Response must end with schema-valid JSON verdict."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

  test_strategist:
    source: local
    agency_ref: null
    vendored_at: "agents/skills/test-strategist.md"
    reference_only: "testing/testing-evidence-collector.md"
    purpose: "Design deterministic tests, replay fixtures, and acceptance checks."
    allowed_modes: [read_write_docs, read_only]

  security_reviewer:
    source: agency_agents
    agency_ref: "security/security-appsec-engineer.md"
    vendored_at: "agents/skills/security-reviewer.md"
    pinned_commit: "fc5a192e7e0f2fad0d74686d9165435e410869a8"
    purpose: "Check credential handling, unsafe commands, and sensitive output leakage."
    allowed_modes: [read_only]
    local_overrides:
      - "Read-only. Do not modify files."
      - "Response must end with schema-valid JSON verdict when used as a gate."
      - "REWORK verdict must include fix_start_prompt for the fix implementer."

model_policies:
  no_self_review: true
  reviewer_requires_raw_artifacts: true
  rework_verdict_requires_fix_start_prompt: true
  model_dispatch_execution:
    dispatch_preparation_allowed_for: [bookkeeper, designer, breakdown_author]
    execution_requires_human_operator: true
    all_model_sessions_forbidden: true
    applies_to:
      - implementation
      - embedded_pre_review
      - review_1
      - review_2
      - fix
    notes:
      - "No model session - regardless of provider - may invoke, launch, or relay to another model session or adapter command (including claude-glm -p, kimi -p, codex exec, grok)."
      - "Any model session may prepare dispatch packets, prompts, routing metadata, and handoff text; only the human operator executes them."
      - "Human operators execute prepared dispatch packets in the target model terminal and record raw output or receipt evidence."
      - "A model's claim to have launched another model is never dispatch evidence."
      - "Do not mark a target model unavailable merely because the preparing session cannot invoke that model directly."
  parallel_mode:
    cross_review_selection_ref: "model_policies.review_1_selection_rules"
    r10_checklist_location: "status.json tasks[].r10_checklist or status.json.r10_checklists.<task-id>"
    embedded_read_only_command_ref_template: "agents/registry.yaml#adapters.<reviewer>.embedded_read_only_review_command"
    failure_class_ref: "failure_classes.embedded_checkpoint"
    dispatch_protocol_value: "human-operator/v1"
    executor_contract_marker: "[HARNESS-EXECUTOR-CONTRACT v1]"
    embedded_review:
      default_enabled: false
      opt_in_requires: "non-empty reason in status.json parallel_mode.embedded_review.reason"
      never_replaces_formal_review_1: true
      notes:
        - "Embedded pre-review is opt-in since parallel-mode doc v0.5. When not enabled, no embedded-review-* artifacts are produced and the validator does not check them."
        - "When enabled, the designer prewrites parameterized round-1 and round-2 prompt files; the human operator executes the dispatch."
  invalid_json_verdict: retry_once_then_fallback_or_human_escalation
  invalid_json_max_attempts_per_model: 2
  default_max_rework: 3
  diff_fingerprint: "head_sha + ':' + sha256(git diff --binary <base_sha>..<head_sha> -- . ':(exclude)reports/agent-runs/<stage-id>/status.json')"
  final_reviewer_should_differ_from_designer: true
  final_reviewer_design_conflict_override:
    allowed_for_strong_reviewers: [codex, claude]
    requires:
      - "unrelated decision model failed a runner-level availability or schema-valid verdict check"
      - "fallback_reason recorded in status.json"
      - "unrelated reviewer unavailable evidence file exists"
      - "reviewer_prior_involvement recorded in the verdict and status.json"
      - "review-2 prompt reviews against user-approved synthesis and PRD, not only 00-task.md/10-design.md"
    never_allowed_when:
      - "reviewer provider wrote implementation code"
      - "reviewer provider wrote fix code"
  review_1_identity_granularity: provider
  review_2_identity_granularity: provider
  review_1_cross_review_pool:
    - kimi
    - claude_glm
  review_1_selection_rules:
    - "If implementer provider is claude_glm, review-1 uses kimi."
    - "If implementer provider is kimi, review-1 uses claude_glm."
    - "For other implementers, choose the first available reviewer from the pool that does not share provider identity with the implementer."
    - "Review-1 must use a fresh read-only/plan session and raw artifacts."
  grok_default_gate: false
  grok_development_model: "grok-composer-2.5-fast"
  review_2_fallback_allowed_on:
    - quota_exhausted
    - auth_failure
    - service_unavailable
    - timeout
    - anti_self_review_ineligible
    - invalid_verdict_json
  future_review_2_fallback_candidates:
    - provider: google
      model: "Gemini 3.1 Pro"
      trigger: "Enable only if design-conflict overrides become frequent or the user explicitly approves a third decision model."
  implementation_routing:
    codex_eligible_for_implementation_or_fix: false
    default_backend_owner: claude_glm
    default_frontend_owner: kimi
    mixed_stage_policy:
      - "If backend/API/schema/normalization work is the large majority and frontend work is light integration or copy/display wiring, dispatch the whole bounded task to claude_glm."
      - "If frontend/UI/client integration work is the large majority and backend work is light endpoint/schema glue, dispatch the whole bounded task to kimi."
      - "If backend and frontend work are both substantial and separable, split ownership: claude_glm owns backend/API/contracts/schemas/data semantics; kimi owns frontend/UI/client integration."
      - "Fix routing follows the same domain ownership unless the active stage records a stricter owner or exclusion rule."
  terminal_stop_reasons:
    - decision_models_exhausted
    - development_models_exhausted
    - stage_accepted_waiting_user
    - human_escalation_required

failure_classes:
  embedded_checkpoint:
    - model_unavailable
    - adapter_missing
    - command_error
    - permission_error
    - timeout
    - invalid_pre_review_output
    - scope_or_contract_dispute

rotation_defaults:
  designers: [codex, claude]
  direction_panel_scope: milestone_or_user_requested
  direction_panel_skip_allowed_when:
    - user_approved_lightweight_route
    - existing_synthesis_covers_task
  direction_panel:
    registry_ref: direction_panels.default
    output_dir: "reports/agent-runs/{{stage_id}}/direction-drafts"
    member_output_template: "{{model_id}}.md"
    unavailable_output_template: "{{model_id}}.unavailable.md"
  complexity_levels:
    LOW:
      direction_panel_required: false
      route: stage-design
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    MEDIUM:
      direction_panel_required: false
      route: stage-design
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    HIGH:
      direction_panel_required: true
      route: direction-drafts
      user_override_allowed: true
    MILESTONE:
      direction_panel_required: true
      route: direction-drafts
      user_override_allowed: false
  direction_synthesizer:
    provider: codex
    output: "06-direction-synthesis.md"
  development_breakdown:
    provider: claude
    model: "claude-fable-5"
    fallback_model_on_quota: "opus4.8"
    skill: task_planner
    output: "12-development-breakdown.md"
    required_for: [MEDIUM, HIGH, MILESTONE]
  review_1:
    cross_review_pool:
      - provider: kimi
        model: "kimi-2.7"
      - provider: claude_glm
        model: "glm-5.2[1m]"
    selection:
      implementer_provider_claude_glm: kimi
      implementer_provider_kimi: claude_glm
      default_preference: [kimi, claude_glm]
  review_2:
    primary: codex
    fallback: claude
  review_policy:
    review_1_may_equal_designer: true
    final_review_2_should_differ_from_designer: true
    final_review_2_design_conflict_override_allowed: true
    review_1_provider_must_differ_from_implementer_provider: true
    review_1_requires_fresh_read_only_session: true
    review_2_provider_must_differ_from_implementer_provider: true
    review_2_provider_must_differ_from_fix_author_provider: true
    review_2_disclosure_required_when_reviewer_participated_in_design: true
    review_2_fallback_allowed_only_on_listed_reasons: true
