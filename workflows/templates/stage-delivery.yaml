version: 1
name: stage-delivery
description: >
  Template for one bounded quality-gated project delivery stage. The
  orchestrator is the abstract workflow state machine; the bookkeeper is the
  single writer for stage state, evidence commits, and model-facing dispatch
  packets. Human operators execute prepared dispatch packets in model terminals.
  The template is used for bounded delivery stages after product requirements,
  acceptance criteria, and test strategy are recorded for the stage.

orchestrator:
  type: abstract_workflow_semantics
  can_accept_final: false

bookkeeper:
  registry_ref: bookkeepers.default
  default_must_be_independent_from_implementers: true
  can_accept_final: false
  compatibility_alias: controller

guards:
  require_git_repo: true
  require_stage_branch: true
  stage_branch_name_template: "stage/{{stage_id}}"
  stage_branch_gate_enabled_when: "status.json.stage_branch.name is non-empty"
  review_2_accept_does_not_merge_main: true
  merge_to_main_requires_user_acceptance: true
  forbid_rebase: true
  require_committed_state_before_review: true
  model_dispatch_execution_requires_human: true
  codex_gpt_claude_must_not_execute_model_dispatch: true
  forbid_worktree_fingerprint: true
  validate_stage_script: "scripts/validate-stage.py"
  fail_closed_on_invalid_json: true
  reviewer_uses_raw_artifacts: true
  parallel_mode_contract: "docs/parallel-development-mode.md"
  require_r10_dispatch_tail_when_parallel_mode: true
  require_r4_diff_reconciliation_before_parallel_task_commits: true
  max_rework_per_stage: 3
  no_self_review:
    final_reviewer_prefer_not_designer: true
    final_reviewer_design_conflict_override_allowed_for: [codex, claude]
    reviewer_not_implementer: true
    final_reviewer_not_code_author: true
    design_conflict_override_requires:
      - "unrelated decision model failed a runner-level check"
      - "fallback_reason recorded in status.json"
      - "unrelated reviewer failure evidence file exists"
      - "reviewer_prior_involvement recorded in verdict and status.json"
      - "review-2 prompt reviews against user-approved synthesis and PRD, not only stage design"
  human_gate_required_for:
    - direction_synthesis_approval
    - product_domain_semantics
    - external_side_effects
    - credentials
    - destructive_data_action
    - public_deployment
    - changing_risk_limits

artifacts:
  root: reports/agent-runs
  template: reports/agent-runs/_template
  required_files:
    - 00-intake.md
    - 00-task.md
    - 10-design.md
    - 11-adr.md
    - 20-implementation.md
    - 30-review-1.md
    - 40-fix-report.md
    - 50-review-2.md
    - 60-test-output.txt
    - 70-handoff.md
    - status.json
  conditional_files:
    medium_high_milestone:
      - 12-development-breakdown.md
    parallel_development_with_embedded_cross_review:
      - "embedded-review-<task-id>-round<N>.diff.patch"
      - "embedded-review-<task-id>-round<N>.dispatch.md"
      - "embedded-review-<task-id>-round<N>.raw-output.md"
      - "embedded-review-<task-id>-round<N>.fix-note.md when fixed"
      - "embedded-review-<task-id>.prompt.md"
      - "pre-review-task-<task-id>-by-<reviewer>.prompt.md"
  direction_files_required_for_milestone_freeze:
    - direction-drafts/*.md
    - 06-direction-synthesis.md

rotation:
  complexity_evaluator:
    provider: claude_glm
    model: "glm-5.2[1m]"
    skill: complexity_evaluator
    output: "00-intake.md"
  direction_panel_scope: milestone_or_user_requested
  direction_panel_skip_allowed_when:
    - user_approved_lightweight_route
    - existing_synthesis_covers_task
  direction_panel:
    registry_ref: direction_panels.default
    output_dir: "reports/agent-runs/{{stage_id}}/direction-drafts"
    member_output_template: "{{model_id}}.md"
    unavailable_output_template: "{{model_id}}.unavailable.md"
    source_override_allowed_from:
      - "approved stage intake"
      - "agents/registry.yaml direction_panels.<stage_key>"
    stage_key_mapping: "replace '-' with '_' when deriving a registry panel key from stage_id"
    active_panel_key_must_be_recorded_in:
      - "00-intake.md"
      - "status.json"
  direction_synthesizer:
    provider: codex
    model: gpt
    skill: product_strategist
    output: "06-direction-synthesis.md"
  development_breakdown:
    provider: claude
    model: "claude-fable-5"
    fallback_model_on_quota: "opus4.8"
    skill: task_planner
    output: "12-development-breakdown.md"
    required_for: [MEDIUM, HIGH, MILESTONE]
  designers:
    - codex
    - claude
  review_1:
    cross_review_pool:
      - provider: kimi
        model: "kimi-2.7"
      - provider: claude_glm
        model: "glm-5.2[1m]"
    selection:
      implementer_provider_claude_glm: kimi
      implementer_provider_kimi: claude_glm
      default_preference: [kimi, claude_glm]
  review_2:
    primary: codex
    fallback: claude
    fallback_only_on:
      - quota_exhausted
      - auth_failure
      - service_unavailable
      - timeout
      - anti_self_review_ineligible
      - invalid_verdict_json
  policy:
    # Review-1 is a cross-review quality pass. Review-2 is the final gate.
    review_1_may_equal_designer: true
    review_2_should_differ_from_designer: true
    review_2_design_conflict_override_allowed: true
    review_1_identity_granularity: provider
    review_2_identity_granularity: provider
    review_1_provider_must_differ_from_implementer_provider: true
    review_1_requires_fresh_read_only_session: true
    review_2_provider_must_differ_from_any_code_author_provider: true
    review_2_disclosure_required_when_reviewer_participated_in_design: true
    invalid_verdict_json_max_attempts_per_model: 2
    do_not_seek_second_opinion_after_valid_review_2_verdict: true
  complexity_routing:
    LOW:
      route: stage-branch-intake
      direction_panel_required: false
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    MEDIUM:
      route: stage-branch-intake
      direction_panel_required: false
      requires_one_of:
        - user_approved_lightweight_route
        - existing_synthesis_covers_task
    HIGH:
      route: direction-drafts
      direction_panel_required: true
      user_override_allowed: true
    MILESTONE:
      route: direction-drafts
      direction_panel_required: true
      user_override_allowed: false

stop_conditions:
  decision_models_exhausted:
    description: "Both GPT/Codex and Claude are quota-exhausted or unavailable for decision/final review."
    terminal: true
  development_models_exhausted:
    description: "All development models are quota-exhausted or unavailable for implementation/fix tasks."
    terminal: true
  stage_accepted_waiting_user:
    description: "The stage passes review; stop and wait for explicit user acceptance before merging the stage branch to main."
    terminal: true
  human_escalation_required:
    description: "Human decision is required for rework limit, unresolved BLOCKED verdict, missing evidence, invalid verdict JSON after retry/fallback, or human gate."
    terminal: true

inputs:
  product_docs:
    - docs/product/PRD.md
    - docs/architecture/ARCHITECTURE.md
    - docs/development/DEVELOPMENT_GUIDE.md
    - docs/planning/ROADMAP.md
    - docs/planning/DECISIONS.md
  workflow_docs:
    - AGENTS.md
    - docs/parallel-development-mode.md
    - agents/registry.yaml
    - docs/model-adapters.md
    - agents/skills/UPSTREAM.md
    - schemas/review-verdict.schema.json

stages:
  - id: complexity-evaluator
    run_when:
      - "after user requirement discussion"
      - "before deciding whether to run registered direction-panel drafting"
    actor: rotation.complexity_evaluator
    skill: complexity_evaluator
    mode: read_write_docs
    writes:
      - "reports/agent-runs/{{stage_id}}/00-intake.md"
      - "reports/agent-runs/{{stage_id}}/status.json"
    classification:
      allowed_values: [LOW, MEDIUM, HIGH, MILESTONE]
    routing:
      LOW:
        if:
          any:
            - user_approved_lightweight_route
            - existing_synthesis_covers_task
        then: stage-branch-intake
        else: human_escalation_required
      MEDIUM:
        if:
          any:
            - user_approved_lightweight_route
            - existing_synthesis_covers_task
        then: stage-branch-intake
        else: human_escalation_required
      HIGH: direction-drafts
      MILESTONE: direction-drafts
      user_override:
        HIGH: stage-branch-intake
        LOW: direction-drafts
        MEDIUM: direction-drafts
    acceptance:
      - "Classification includes rationale, direction-panel requirement, and human gates."
      - "LOW/MEDIUM tasks can skip registered direction-panel drafting only when user-approved or covered by existing synthesis; otherwise ask the user to confirm."
      - "MILESTONE tasks always enter registered direction-panel drafting."
    transitions:
      stage_design: stage-branch-intake
      direction_drafts: direction-drafts
      human_gate: human_escalation_required

  - id: direction-drafts
    run_when:
      - "milestone direction or requirements are being frozen"
      - "user requests a multi-model direction round"
      - "complexity-evaluator output requires direction panel"
    skip_allowed_when:
      - "user explicitly approves a lightweight task"
      - "an existing direction synthesis covers the task"
    actor_panel: rotation.direction_panel
    skill: product_strategist
    mode: read_write_docs
    writes:
      - "reports/agent-runs/{{stage_id}}/direction-drafts/<model-id>.md"
      - "reports/agent-runs/{{stage_id}}/direction-drafts/<model-id>.unavailable.md when unavailable"
    acceptance:
      - "Each registered panel member has an independent direction draft or an explicit quota/unavailable note."
      - "Drafts preserve source model identity and are not replaced by bookkeeper summaries."
      - "The active panel membership is recorded in the stage intake or registry before synthesis."

  - id: direction-synthesis
    actor: rotation.direction_synthesizer
    skill: product_strategist
    mode: read_write_docs
    reads:
      - "reports/agent-runs/{{stage_id}}/direction-drafts/*.md"
      - "reports/agent-runs/{{stage_id}}/direction-drafts/*.unavailable.md"
    writes:
      - "reports/agent-runs/{{stage_id}}/06-direction-synthesis.md"
    acceptance:
      - "The configured synthesizer, normally GPT/Codex, synthesizes, attributes, and formats the final direction for user review."
      - "Synthesis lists accepted ideas, rejected/deferred ideas, frozen requirements, and open human decisions."
      - "Development remains paused until user approval."
      - "Synthesis remains in reports until approved; canonical docs are updated only after approval."
    transitions:
      user_approved: promote-approved-docs
      decision_models_exhausted: decision_models_exhausted
      human_gate: human_escalation_required

  - id: promote-approved-docs
    run_when:
      - "after user approval of direction synthesis"
      - "before stage design if canonical docs need updates"
    actor: bookkeeper
    skill: product_strategist
    mode: read_write_docs
    reads:
      - "reports/agent-runs/{{stage_id}}/06-direction-synthesis.md"
    writes:
      - "docs/product/PRD.md"
      - "docs/architecture/ARCHITECTURE.md"
      - "docs/architecture/ADR/"
      - "docs/development/DEVELOPMENT_GUIDE.md"
      - "docs/planning/ROADMAP.md"
      - "docs/planning/DECISIONS.md"
    acceptance:
      - "Only user-approved synthesis and decisions are promoted."
      - "No raw model draft is copied into canonical docs without consolidation."
      - "Open questions remain marked and are not converted into approved requirements."
    transitions:
      done: stage-branch-intake
      human_gate: human_escalation_required

  - id: stage-branch-intake
    run_when:
      - "after user approval of a direction synthesis, or after an approved lightweight route"
      - "before stage-design and before any delivery-stage evidence commits"
    actor: bookkeeper
    skill: task_planner
    mode: run_commands
    reads:
      - "AGENTS.md"
      - "workflows/templates/stage-delivery.yaml"
      - "reports/agent-runs/{{stage_id}}/00-intake.md"
      - "reports/agent-runs/{{stage_id}}/06-direction-synthesis.md when present"
    writes:
      - "reports/agent-runs/{{stage_id}}/status.json"
      - "reports/agent-runs/{{stage_id}}/70-handoff.md"
    branch:
      name_template: "stage/{{stage_id}}"
      create_from: "main"
      record_fields:
        - "stage_branch.name"
        - "stage_branch.created_from_main_sha"
        - "stage_branch.created_at"
        - "stage_branch.merged_back_to_main=false"
      default_policy:
        - "Keep the stage branch pure; do not merge main into the stage branch."
        - "Harness/template sync commits land on main only."
        - "If the stage needs new Harness behavior from main, record the reason, merge main into the stage branch, rerun tests and validator, recompute fingerprints, and re-enter or rebind review gates as required."
        - "Rebase is forbidden."
    acceptance:
      - "Current branch is status.json.stage_branch.name."
      - "stage_branch.created_from_main_sha is a resolvable main commit."
      - "No implementation, review, fix, or terminal bookkeeping commit for this stage lands on main before explicit user acceptance."
    transitions:
      done: stage-design
      human_gate: human_escalation_required

  - id: stage-design
    preflight:
      - "If status.json.stage_branch.name is non-empty, current branch must match it."
      - "Stage design evidence is written on the stage branch, not directly on main."
    actor: rotation.designers
    skill: software_architect
    mode: read_write_docs
    writes:
      - "reports/agent-runs/{{stage_id}}/00-task.md"
      - "reports/agent-runs/{{stage_id}}/10-design.md"
      - "reports/agent-runs/{{stage_id}}/11-adr.md"
    acceptance:
      - "Scope, non-goals, file boundaries, tests, and human gates are explicit."
      - "ADR records design context, alternatives, tradeoffs, and reviewer notes."
      - "Designer identity is recorded in status.json."

  - id: development-breakdown
    run_when:
      - "after stage-design"
      - "before implementation for MEDIUM, HIGH, and MILESTONE stages"
    skip_allowed_when:
      - "complexity is LOW and user approved lightweight route"
    actor: rotation.development_breakdown
    skill: task_planner
    mode: read_write_docs
    reads:
      - "reports/agent-runs/{{stage_id}}/00-task.md"
      - "reports/agent-runs/{{stage_id}}/10-design.md"
      - "reports/agent-runs/{{stage_id}}/11-adr.md"
      - "reports/agent-runs/{{stage_id}}/06-direction-synthesis.md when present"
      - "docs/product/PRD.md"
      - "docs/architecture/ARCHITECTURE.md when present"
    writes:
      - "reports/agent-runs/{{stage_id}}/12-development-breakdown.md"
      - "reports/agent-runs/{{stage_id}}/status.json"
    acceptance:
      - "Breakdown defines backend/frontend ownership, file boundaries, API/data contracts, tests, risk points, and do-not-touch areas."
      - "Breakdown author identity is recorded in status.json.breakdown_author."
      - "Breakdown is design involvement for review-2 disclosure purposes."

  - id: task-breakdown
    preflight:
      - "If parallel_mode.enabled=true, run scripts/validate-stage.py {{stage_id}} --phase dispatch-ready and store output in 60-test-output.txt or an adjacent validation log before implementation starts."
    actor: bookkeeper
    skill: task_planner
    mode: read_write_docs
    reads:
      - "reports/agent-runs/{{stage_id}}/00-task.md"
      - "reports/agent-runs/{{stage_id}}/10-design.md"
      - "reports/agent-runs/{{stage_id}}/11-adr.md"
      - "reports/agent-runs/{{stage_id}}/12-development-breakdown.md when present"
    writes:
      - "reports/agent-runs/{{stage_id}}/70-handoff.md"
      - "reports/agent-runs/{{stage_id}}/status.json"
    acceptance:
      - "Implementation tasks have clear owners, dependencies, and file boundaries."
      - "For multi-task stages, status.json records each task with owner, reviewer, base_sha/head_sha/diff_fingerprint, review verdict, and test evidence path."
      - "For parallel development stages, dispatch packets include R10 self-executing next_dispatch commands and exact artifact paths."
      - "For parallel development stages, status.json records tasks[].r10_checklist or r10_checklists.<task-id> with machine-readable dispatch-ready fields."

  - id: implementation
    actor_pool:
      - model: claude_glm
        skill: senior_developer
        primary_domains: [backend, api_contracts, schemas, data_normalization, external_api_samples]
        may_own_whole_mixed_task_when: "backend work is the large majority and frontend work is light integration or display wiring"
      - model: kimi
        skill: senior_developer
        primary_domains: [frontend, ui, client_integration, frontend_tests]
        may_own_whole_mixed_task_when: "frontend work is the large majority and backend work is light endpoint or schema glue"
    optional_actor_pool:
      - model: grok
        required_model: "grok-composer-2.5-fast"
        skill: senior_developer
        requires_user_enablement: true
    mode: write_code
    max_parallel: "stage_defined"
    reads:
      - "AGENTS.md"
      - "agents/developer-discipline.md"
      - "reports/agent-runs/{{stage_id}}/00-task.md"
      - "reports/agent-runs/{{stage_id}}/10-design.md"
      - "reports/agent-runs/{{stage_id}}/11-adr.md"
      - "reports/agent-runs/{{stage_id}}/12-development-breakdown.md when present"
      - "reports/agent-runs/{{stage_id}}/status.json"
    writes:
      - "source files within task boundary"
      - "tests within task boundary"
      - "reports/agent-runs/{{stage_id}}/20-implementation.md"
      - "parallel-mode embedded review artifacts when R10 next_dispatch is executed"
    routing_rules:
      - "Apply status.json.model_routing stage-specific owner and exclusion rules before generic actor_pool selection."
      - "A model listed in status.json.model_routing.excluded_for_core_work is ineligible for current-stage implementation even if it appears in this generic actor_pool."
      - "Codex is not eligible for implementation or fix authorship."
      - "Default backend/API/contract/schema/data-semantics owner is claude_glm."
      - "Default frontend/UI/client-integration owner is kimi."
      - "If backend work is the large majority and frontend work is light, dispatch the whole bounded task to claude_glm."
      - "If frontend work is the large majority and backend work is light, dispatch the whole bounded task to kimi."
      - "If backend and frontend work are both substantial and separable, split implementation by domain owner."
      - "Bookkeeper, Codex/GPT, and Claude sessions prepare implementation dispatch packets only; the human operator executes them in the selected implementer terminal."
      - "When docs/parallel-development-mode.md applies, the implementer must execute or escalate any next_dispatch marked executor:self before reporting completion."
    acceptance:
      - "Changed files match task boundaries or deviations are explained."
      - "Implementation report lists design decisions and tests run."
      - "Parallel-mode implementation reports include the R10 receipt block, embedded review output path, and PASS/BLOCKER disposition."

  - id: embedded-cross-review-checkpoint
    run_when:
      - "docs/parallel-development-mode.md applies"
      - "an implementation task dispatch packet declares next_dispatch with executor:self"
      - "before the bookkeeper creates H_A/H_B committed evidence"
    actor: implementing_terminal
    skill: code_reviewer
    mode: read_only_checkpoint
    status_effect: "remain implementing; this is not formal review-1"
    reads:
      - "prewritten prompt path from the implementation task's R10 dispatch tail"
      - "task-local diff.patch generated by the exact R10 command"
      - "raw artifacts listed in the prompt"
    writes:
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.diff.patch"
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.dispatch.md"
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.raw-output.md"
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.fix-note.md when fixed"
    rules:
      - "The implementing terminal only executes a prewritten adapter command; it must not rewrite the review prompt or select different artifacts."
      - "The reviewer session must be fresh and read-only/plan mode."
      - "Local embedded review/fix loops are capped at two rounds and do not count as stage rework_count."
      - "A scope-contained BLOCKER routes to a local implementation fix, then embedded review round 2."
      - "Round 2 is the cap. A second BLOCKER, scope/contract dispute, missing evidence, or unsafe fix requirement escalates to bookkeeper-decision."
      - "Embedded checkpoint failure classes come from agents/registry.yaml failure_classes.embedded_checkpoint and route to bookkeeper-decision, not directly to a terminal stop."
      - "The bookkeeper must re-generate and reconcile each task diff before committing, per R4."
    transitions:
      PASS: test
      BLOCKER:
        if:
          all:
            - "round < 2"
            - "finding_within_task_scope"
            - "no_contract_or_schema_change_required"
        then: implementation
        else: bookkeeper-decision
      model_unavailable: bookkeeper-decision
      adapter_missing: bookkeeper-decision
      command_error: bookkeeper-decision
      permission_error: bookkeeper-decision
      timeout: bookkeeper-decision
      invalid_pre_review_output: bookkeeper-decision
      scope_or_contract_dispute: bookkeeper-decision

  - id: bookkeeper-decision
    run_when:
      - "embedded-cross-review-checkpoint cannot continue automatically"
      - "a model adapter is unavailable during an embedded checkpoint"
      - "a checkpoint BLOCKER exceeds the local two-round cap or requires scope/contract judgment"
    actor: bookkeeper
    skill: task_planner
    mode: read_write_docs
    reads:
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.raw-output.md"
      - "reports/agent-runs/{{stage_id}}/embedded-review-<task-id>-round<N>.diff.patch"
      - "reports/agent-runs/{{stage_id}}/20-implementation*.md"
      - "reports/agent-runs/{{stage_id}}/status.json"
    writes:
      - "reports/agent-runs/{{stage_id}}/70-handoff.md"
      - "reports/agent-runs/{{stage_id}}/status.json"
    acceptance:
      - "Bookkeeper records whether to run a scope-contained local fix, reassign the checkpoint reviewer, revise the task packet, or escalate to a terminal human gate."
      - "Bookkeeper does not convert embedded pre-review output into a formal review-1 verdict."
    transitions:
      scope_fix_allowed: implementation
      reviewer_reassigned: embedded-cross-review-checkpoint
      task_packet_revision_required: task-breakdown
      human_gate: human_escalation_required

  - id: test
    actor: bookkeeper
    skill: test_strategist
    mode: run_commands
    writes:
      - "reports/agent-runs/{{stage_id}}/60-test-output.txt"
      - "reports/agent-runs/{{stage_id}}/status.json"
    commands:
      - "{{project.test_command}}"
      - "{{project.lint_command}}"
    acceptance:
      - "Tests are run against current git state."
      - "Failures block final review unless failure triage is the task."

  - id: review-1
    preflight:
      - "Bookkeeper must locally commit reviewed artifacts before preparing the human-executed dispatch packet."
      - "If status.json.stage_branch.name is non-empty, current branch must match it."
      - "status.json status must be review_1."
      - "Run scripts/validate-stage.py {{stage_id}} --phase pre-review and store output in 60-test-output.txt or an adjacent validation log."
      - "Use base_sha..head_sha from status.json for the reviewed diff; do not use a moving HEAD when later Harness commits exist."
      - "Check docs/model-adapters.md and agents/registry.yaml before declaring the reviewer unavailable."
      - "Codex/GPT and Claude sessions prepare review-1 dispatch packets only; the human operator executes them in the target model terminal and records raw output evidence."
    actor:
      selection: rotation.review_1
    skill: code_reviewer
    mode: read_only
    adapter_requirements:
      kimi: "Use Kimi with --model kimi-code/kimi-for-coding for one-shot prompt execution. For read-only review, enforce read-only behavior in the prompt and wrapper; current Kimi CLI rejects combining --plan or -y with -p."
      claude_glm: "Use a fresh read-only Claude-GLM session with a schema-bound custom prompt. Do not reuse the implementation/bookkeeper transcript as review evidence."
      grok: "Grok is not a default review-1 gate. Use only when the user explicitly enables it for the stage."
    requires_raw_artifacts:
      - "workflow YAML"
      - "00-task.md"
      - "10-design.md"
      - "11-adr.md"
      - "12-development-breakdown.md when present"
      - "06-direction-synthesis.md when present"
      - "git diff or patch"
      - "20-implementation.md"
      - "40-fix-report.md when present"
      - "60-test-output.txt"
      - "relevant source files"
    identity_rules:
      reviewer_provider_must_differ_from_implementer_provider: true
      reviewer_session_must_be_fresh: true
      reviewer_may_equal_designer: true
    writes:
      - "reports/agent-runs/{{stage_id}}/30-review-1.md"
    output_contract:
      schema: schemas/review-verdict.schema.json
      rework_requires_fix_start_prompt: true
      fix_start_prompt:
        required_when: "verdict == REWORK"
        purpose: "Ready-to-send prompt for the fix implementer."
        must_include:
          - "stage_id and diff_fingerprint under review"
          - "raw review file path and raw verdict JSON path"
          - "ordered findings with severity, file/line evidence, impact, and recommendation"
          - "required_fixes from the verdict"
          - "allowed file boundaries for the fix"
          - "forbidden paths and side effects"
          - "exact test/lint/typecheck commands to run after the fix"
          - "expected 40-fix-report.md finding-to-fix mapping"
        must_not:
          - "replace raw reviewer evidence with a bookkeeper summary"
          - "broaden scope beyond the reviewed findings"
      invalid_json:
        first: retry_same_model_once
        max_attempts_per_model: 2
        then: human_escalation_required
    transitions:
      ACCEPT: review-2
      REWORK: fix
      BLOCKED: human_escalation_required
      human_gate: human_escalation_required
      model_unavailable: human_escalation_required

  - id: fix
    actor: original_implementer_or_eligible_pool
    skill: minimal_change_engineer
    mode: write_code
    max_rework: "{{guards.max_rework_per_stage}}"
    routing_rules:
      - "Apply status.json.model_routing stage-specific owner and exclusion rules before generic fix selection."
      - "Do not send fixes to a model excluded from current-stage core work unless the user explicitly re-enables it."
      - "Do not send fixes to Codex."
      - "Route backend/API/contract/schema/data-semantics fixes to claude_glm by default."
      - "Route frontend/UI/client-integration fixes to kimi by default."
      - "For a whole-task GLM or Kimi implementation, route scope-contained fixes back to the original implementer unless provider isolation for a later review would be violated."
    reads:
      - "AGENTS.md"
      - "agents/developer-discipline.md"
      - "reports/agent-runs/{{stage_id}}/00-task.md"
      - "reports/agent-runs/{{stage_id}}/10-design.md"
      - "reports/agent-runs/{{stage_id}}/11-adr.md"
      - "reports/agent-runs/{{stage_id}}/06-direction-synthesis.md when present"
      - "reports/agent-runs/{{stage_id}}/30-review-1.md"
      - "reports/agent-runs/{{stage_id}}/50-review-2.md"
      - "reviewer-provided fix_start_prompt from the active REWORK verdict"
    writes:
      - "reports/agent-runs/{{stage_id}}/40-fix-report.md"
      - "source files within finding scope"
      - "tests within finding scope"
    transitions:
      done: test
      limit_exceeded: human_escalation_required
      development_models_exhausted: development_models_exhausted

  - id: review-2
    preflight:
      - "Bookkeeper must locally commit reviewed artifacts before preparing the human-executed dispatch packet."
      - "If status.json.stage_branch.name is non-empty, current branch must match it."
      - "status.json status must be review_2."
      - "Run scripts/validate-stage.py {{stage_id}} --phase pre-review and store output in 60-test-output.txt or an adjacent validation log."
      - "Use base_sha..head_sha from status.json for the reviewed diff; do not use a moving HEAD when later Harness commits exist."
      - "Check docs/model-adapters.md and agents/registry.yaml before declaring Codex or Claude unavailable."
      - "If the selected final reviewer participated in direction synthesis, breakdown, or design, record the design-conflict override evidence before preparing dispatch."
      - "Codex/GPT and Claude sessions prepare review-2 dispatch packets only; the human operator executes them in the target model terminal and records raw output evidence."
    actor:
      primary: codex
      fallback: claude
      fallback_only_on:
        - quota_exhausted
        - auth_failure
        - service_unavailable
        - timeout
        - anti_self_review_ineligible
        - invalid_verdict_json
      strong_reviewer_override:
        eligible_models: [codex, claude]
        allowed_only_when:
          - "the preferred unrelated decision model failed runner-level availability or schema-valid verdict checks"
          - "the failure evidence file is recorded in status.json"
          - "the reviewer did not implement or fix any reviewed delivery code"
    skill: reality_checker
    mode: read_only
    adapter_requirements:
      codex: "Use read-only codex exec with the configured GPT/Codex adapter default and a schema-bound custom prompt, not codex review."
      claude: "Use read-only/plan Claude invocation with claude-fable-5 by default; if Fable5 quota is exhausted, use opus4.8 with the same schema-bound prompt."
    requires:
      - "reviewer provider != any implementation or fix author provider"
      - "prefer reviewer provider != designer provider"
      - "designer-provider overlap requires the strong-reviewer disclosure override"
    identity_rules:
      reviewer_provider_should_differ_from_designer_provider: true
      reviewer_provider_must_differ_from_implementer_provider: true
      reviewer_provider_must_differ_from_fix_author_provider: true
      designer_overlap_requires_reviewer_prior_involvement: true
      designer_overlap_requires_fallback_reason_and_evidence: true
      design_conflict_override_allowed_for_strong_reviewers: [codex, claude]
      fallback_to_claude_if_codex_unavailable_or_design_conflicted: true
      stop_if_claude_unavailable: true
    requires_raw_artifacts:
      - "workflow YAML"
      - "docs/product/PRD.md"
      - "docs/architecture/ARCHITECTURE.md when present"
      - "00-task.md"
      - "10-design.md"
      - "11-adr.md"
      - "12-development-breakdown.md when present"
      - "06-direction-synthesis.md when present"
      - "git diff or patch"
      - "20-implementation.md"
      - "40-fix-report.md"
      - "60-test-output.txt"
      - "30-review-1.md"
      - "relevant source files"
    override_prompt_requirements:
      - "When reviewer_prior_involvement is not none, review the stage design and breakdown as evidence under review."
      - "Use the user-approved synthesis, PRD, and product documents as higher authority than 00-task.md/10-design.md/11-adr.md."
      - "Disclose the prior involvement in the narrative and in the strict JSON verdict."
    writes:
      - "reports/agent-runs/{{stage_id}}/50-review-2.md"
    output_contract:
      schema: schemas/review-verdict.schema.json
      reviewer_prior_involvement_required: true
      rework_requires_fix_start_prompt: true
      fix_start_prompt:
        required_when: "verdict == REWORK"
        purpose: "Ready-to-send prompt for the fix implementer."
        must_include:
          - "stage_id and diff_fingerprint under review"
          - "raw review file path and raw verdict JSON path"
          - "ordered findings with severity, file/line evidence, impact, and recommendation"
          - "required_fixes from the verdict"
          - "allowed file boundaries for the fix"
          - "forbidden paths and side effects"
          - "exact test/lint/typecheck commands to run after the fix"
          - "expected 40-fix-report.md finding-to-fix mapping"
        must_not:
          - "replace raw reviewer evidence with a bookkeeper summary"
          - "broaden scope beyond the reviewed findings"
      invalid_json:
        first: retry_same_model_once
        max_attempts_per_model: 2
        then: fallback_if_allowed
        exhausted: human_escalation_required
    transitions:
      ACCEPT: stage_accepted_waiting_user
      REWORK: fix
      BLOCKED: human_escalation_required
      decision_models_exhausted: decision_models_exhausted
      human_gate: human_escalation_required

terminal_states:
  stage_accepted_waiting_user:
    preflight:
      - "Run scripts/validate-stage.py {{stage_id}} --phase pre-accept before writing the terminal state."
    bookkeeper_action:
      - "update status.json"
      - "update 70-handoff.md"
      - "do not merge the stage branch to main"
      - "stop and wait for explicit user acceptance"
  accepted:
    run_when:
      - "after explicit user acceptance of stage_accepted_waiting_user"
    preflight:
      - "User acceptance is recorded before any merge to main."
      - "If status.json.stage_branch.name is non-empty, merge or fast-forward the stage branch to main according to status.json.stage_branch.merge_strategy."
      - "If main advanced, resolve conflicts on main side; do not rewrite or rebase the stage branch."
      - "After merge, record status.json.stage_branch.merged_back_to_main=true and merged_back_sha."
      - "Run scripts/validate-stage.py {{stage_id}} --phase pre-accept after the merge recheck."
    bookkeeper_action:
      - "update status.json"
      - "update 70-handoff.md"
      - "record merge_strategy as fast_forward or main_side_merge_commit"
      - "stop and wait for the next user-directed stage"
  decision_models_exhausted:
    bookkeeper_action:
      - "update status.json"
      - "update 70-handoff.md"
      - "report GPT/Codex and Claude decision model exhaustion"
      - "stop stage delivery"
  development_models_exhausted:
    bookkeeper_action:
      - "update status.json"
      - "update 70-handoff.md"
      - "report all development model exhaustion"
      - "stop stage delivery"
  human_escalation_required:
    bookkeeper_action:
      - "update status.json"
      - "update 70-handoff.md"
      - "report why automation cannot proceed safely"
      - "if abandoning the stage branch, record stage_branch.abandoned_reason and do not merge to main"
      - "stop stage delivery and wait for user decision"
